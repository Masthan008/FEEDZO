name: bitego_restaurant_app
description: "BiteGo Restaurant App - Manage orders, earnings, and insights."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  onesignal_flutter: ^5.2.6
  http: ^1.2.2
  # Location & Images
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  # Maps Alternative (OSM)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Sound Alerts
  audioplayers: ^6.1.0
  # Invoice Generation
  pdf: ^3.11.1
  path_provider: ^2.1.4
  printing: ^5.13.0
  # Offline Support
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/sounds/
