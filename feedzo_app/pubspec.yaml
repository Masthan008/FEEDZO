name: feedzo_app
description: "Feedzo - Food Delivery App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  cloud_firestore: ^5.4.4
  onesignal_flutter: ^5.2.6
  http: ^1.2.2
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0
  # Phase 2 - Localization & Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  supabase_flutter: ^2.5.7
  # New — Roadmap dependencies
  lottie: ^3.1.2
  carousel_slider: ^5.0.0
  animations: ^2.0.11
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  razorpay_flutter: ^1.3.7
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo.png
    - assets/animations/
